<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Unificado - IPCA e Investimentos</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #10b981;
      --accent2: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #0f172a;
    }
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 20px 45px rgba(15,23,42,.18);
    }
    .hero h1 {
      margin: 0 0 8px 0;
      font-size: clamp(1.5rem, 2vw, 2.2rem);
    }
    .hero p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0 16px;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: white;
      color: #0f172a;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 2px 8px rgba(15,23,42,.04);
    }
    .tab-btn:hover {
      transform: translateY(-1px);
    }
    .tab-btn.active {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      box-shadow: 0 8px 20px rgba(16,185,129,.22);
    }
    .note {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .panel {
      display: none;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 12px 36px rgba(15,23,42,.08);
      backdrop-filter: blur(6px);
    }
    .panel.active {
      display: block;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 6px 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .panel-title {
      margin: 0;
      font-size: 1.1rem;
    }
    .panel-sub {
      color: var(--muted);
      font-size: .95rem;
    }
    .iframe-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: white;
      border: 1px solid var(--line);
    }
    iframe {
      width: 100%;
      border: 0;
      display: block;
      background: white;
      min-height: 950px;
    }
    .footer {
      margin: 18px 0 6px;
      color: #64748b;
      font-size: .9rem;
      text-align: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: #334155;
      font-size: .85rem;
      font-weight: 600;
    }
    @media (max-width: 720px) {
      .wrap { padding: 14px; }
      .hero { padding: 18px; border-radius: 18px; }
      .panel { padding: 10px; border-radius: 18px; }
      iframe { min-height: 1100px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Dashboard Unificado: IPCA + Simulador de Investimentos</h1>
    </section>

    <div class="tabs">
      <button class="tab-btn active" data-tab="ipca">Calculadora de IPCA</button>
      <button class="tab-btn" data-tab="investimentos">Simulador de Investimentos</button>
    </div>

    <section class="panel active" id="panel-ipca">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Calculadora de Correção Monetária por IPCA</h2>
        </div>
        <div class="chip">Módulo 1</div>
      </div>
      <div class="iframe-wrap">
        <iframe id="frame-ipca" title="Dashboard de IPCA"></iframe>
      </div>
    </section>

    <section class="panel" id="panel-investimentos">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Simulador de Investimentos</h2>
        </div>
        <div class="chip">Módulo 2</div>
      </div>
      <div class="iframe-wrap">
        <iframe id="frame-investimentos" title="Simulador de Investimentos"></iframe>
      </div>
    </section>

    <div class="footer">Arquivo único em HTML para uso local no navegador.</div>
  </div>

    function b64ToUtf8(b64) {
      const binary = atob(b64);
      const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }

    const sourceMap = {
      ipca: b64ToUtf8(IPCA_B64),
      investimentos: b64ToUtf8(SIM_B64)
    };

    const frames = {
      ipca: document.getElementById('frame-ipca'),
      investimentos: document.getElementById('frame-investimentos')
    };

    const loaded = { ipca: false, investimentos: false };

    function loadFrame(tab) {
      if (!loaded[tab]) {
        frames[tab].srcdoc = sourceMap[tab];
        loaded[tab] = true;
      }
    }

    function resizeFrame(tab) {
      const frame = frames[tab];
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;
        const body = doc.body;
        const html = doc.documentElement;
        const height = Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          html ? html.clientHeight : 0,
          html ? html.scrollHeight : 0,
          html ? html.offsetHeight : 0,
          950
        );
        frame.style.height = (height + 24) + 'px';
      } catch (e) {
        // Mantém altura mínima caso o navegador restrinja acesso
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      document.getElementById('panel-ipca').classList.toggle('active', tab === 'ipca');
      document.getElementById('panel-investimentos').classList.toggle('active', tab === 'investimentos');

      loadFrame(tab);
      setTimeout(() => resizeFrame(tab), 500);
      setTimeout(() => resizeFrame(tab), 1500);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => showTab(btn.dataset.tab));
    });


    window.addEventListener('message', event => {
      if (event.data && event.data.type === 'investment-height' && Number(event.data.height)) {
        frames.investimentos.style.height = (Number(event.data.height) + 24) + 'px';
      }
    });
    frames.ipca.addEventListener('load', () => resizeFrame('ipca'));
    frames.investimentos.addEventListener('load', () => resizeFrame('investimentos'));

    loadFrame('ipca');

    setInterval(() => {
      if (loaded.ipca) resizeFrame('ipca');
      if (loaded.investimentos) resizeFrame('investimentos');
    }, 1200);
  </script>
